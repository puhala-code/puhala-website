<style>
/* ============================================================
   puhala.com/health — v2 card grid
   Scoped under .pmvp-h. Default = Daylight (light). data-mode="dark" = Darkroom.
   ============================================================ */

.pmvp-h {
  /* Daylight (light) */
  --bg:          #eef0f2;
  --card:        #ffffff;
  --card-border: rgba(20,30,45,.07);
  --card-shadow: 0 1px 2px rgba(20,30,45,.04), 0 12px 28px -16px rgba(20,30,45,.14);
  --ink:         #101722;
  --ink2:        #1a2230;
  --muted:       #8a93a0;
  --muted2:      #67707d;
  --rule:        rgba(20,30,45,.10);
  --rule-faint:  rgba(20,30,45,.06);
  --track:       rgba(20,30,45,.08);
  --teal:        #0d9488;
  --teal-bright: #0f766e;
  --teal-bg:     rgba(13,148,136,.10);
  --teal-border: rgba(13,148,136,.25);
  --indigo:      #6366f1;
  --indigo-deep: #4338ca;
  --sky:         #0284c7;
  --cyan:        #0891b2;
  --amber:       #b45309;
  --rose:        #dc2626;
  --slate:       #94a3b8;
  --green:       #0d9488;
  --red:         #dc2626;

  background: var(--bg);
  color: var(--ink);
  font-family: 'Onest', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  width: 100%;
  -webkit-font-smoothing: antialiased;
  transition: background .25s ease, color .25s ease;
}

.pmvp-h[data-mode="dark"] {
  --bg:          #0b0d11;
  --card:        #14181e;
  --card-border: rgba(255,255,255,.07);
  --card-shadow: none;
  --ink:         #f3f6f9;
  --ink2:        #e9edf2;
  --muted:       #6a7480;
  --muted2:      #7d8893;
  --rule:        rgba(255,255,255,.07);
  --rule-faint:  rgba(255,255,255,.05);
  --track:       rgba(255,255,255,.08);
  --teal:        #2dd4bf;
  --teal-bright: #5eead4;
  --teal-bg:     rgba(45,212,191,.10);
  --teal-border: rgba(45,212,191,.25);
  --indigo:      #818cf8;
  --indigo-deep: #4f46e5;
  --sky:         #38bdf8;
  --cyan:        #22d3ee;
  --amber:       #fbbf24;
  --rose:        #fb7185;
  --slate:       #475569;
  --green:       #34d399;
  --red:         #fb7185;
}

.pmvp-h * { box-sizing: border-box; }
.pmvp-h .mono { font-family: 'Geist Mono', ui-monospace, monospace; }
.pmvp-h .tnum { font-variant-numeric: tabular-nums; }

.pmvp-h-wrap { max-width: 1180px; margin: 0 auto; padding: 40px 24px 72px; }

/* Header */
.pmvp-h-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding-bottom: 22px; border-bottom: 1px solid var(--rule); margin-bottom: 26px;
  flex-wrap: wrap; gap: 14px;
}
.pmvp-h-brand {
  font-family: 'Geist Mono', ui-monospace, monospace; font-size: 18px;
  letter-spacing: .14em; font-weight: 600; color: var(--ink); white-space: nowrap;
}
.pmvp-h-brand span { color: var(--muted); }
.pmvp-h-sub {
  font-family: 'Geist Mono', ui-monospace, monospace; font-size: 11px;
  letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-top: 7px;
}
.pmvp-h-head-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
.pmvp-h-toggle {
  display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
  background: var(--teal-bg); border: 1px solid var(--teal-border); color: var(--teal-bright);
  font-family: 'Geist Mono', ui-monospace, monospace; font-size: 10.5px;
  letter-spacing: .14em; text-transform: uppercase; padding: 6px 11px; border-radius: 999px;
  transition: border-color .15s, color .15s;
}
.pmvp-h-toggle .dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--teal);
  animation: pmvph-pulse 2.4s infinite;
}
@keyframes pmvph-pulse {
  0%   { box-shadow: 0 0 0 0 rgba(45,212,191,.5); }
  70%  { box-shadow: 0 0 0 7px rgba(45,212,191,0); }
  100% { box-shadow: 0 0 0 0 rgba(45,212,191,0); }
}
.pmvp-h-updated {
  font-family: 'Geist Mono', ui-monospace, monospace; font-size: 11px;
  color: var(--muted); letter-spacing: .04em;
}

/* Grid */
.pmvp-h-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 14px; align-items: stretch; }
.pmvp-h-card {
  background: var(--card); border: 1px solid var(--card-border); border-radius: 18px;
  padding: 20px 22px; box-shadow: var(--card-shadow); display: flex; flex-direction: column;
}
.span4  { grid-column: span 4; }
.span5  { grid-column: span 5; }
.span7  { grid-column: span 7; }
.span12 { grid-column: span 12; }

.pmvp-h-label {
  font-family: 'Geist Mono', ui-monospace, monospace; font-size: 10.5px;
  letter-spacing: .16em; text-transform: uppercase; color: var(--muted);
}
.pmvp-h-cardhead { display: flex; justify-content: space-between; align-items: center; }

/* Generic bits */
.pmvp-h-big { font-size: 44px; font-weight: 800; letter-spacing: -.03em; line-height: 1; color: var(--ink); }
.pmvp-h-unit { font-size: 16px; color: var(--muted); font-weight: 600; }
.pmvp-h-statlabel {
  font-family: 'Geist Mono', ui-monospace, monospace; font-size: 10px;
  letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
}
.pmvp-h-statval { font-size: 22px; font-weight: 700; color: var(--ink2); }
.pmvp-h-statval small { font-size: 12px; color: var(--muted2); font-weight: 500; }
.pmvp-h-foot {
  margin-top: auto; padding-top: 16px; font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 11px; color: var(--muted2); letter-spacing: .03em;
}
.pmvp-h-divider { border-top: 1px solid var(--rule-faint); }

.pmvp-h-pill {
  display: inline-flex; align-items: center; gap: 6px; font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 10.5px; padding: 4px 10px; border-radius: 999px;
}
.pill-teal { color: var(--teal-bright); background: var(--teal-bg); }
.pill-amber { color: var(--amber); background: rgba(180,83,9,.10); }
.pill-rose { color: var(--rose); background: rgba(220,38,38,.10); }

.c-teal { color: var(--teal-bright); }
.c-green { color: var(--green); }
.c-amber { color: var(--amber); }
.c-rose  { color: var(--rose); }
.c-muted { color: var(--muted); }

/* Track / bars */
.pmvp-h-bar { height: 7px; border-radius: 999px; background: var(--track); overflow: hidden; }
.pmvp-h-bar > i { display: block; height: 100%; border-radius: 999px; }

/* Workout rows */
.pmvp-h-wrow { display: flex; align-items: center; gap: 12px; }
.pmvp-h-wrow .wdate { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 10px; color: var(--muted); width: 44px; flex: none; }
.pmvp-h-wrow .wsport { font-size: 13px; color: var(--ink2); width: 120px; flex: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pmvp-h-wrow .wstrain { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 11px; color: var(--muted2); width: 32px; text-align: right; flex: none; }
.pmvp-h-wrow .wdur { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 10px; color: var(--muted); width: 36px; text-align: right; flex: none; }

/* Micro grid */
.pmvp-h-micros { display: grid; grid-template-columns: repeat(3, 1fr); gap: 11px 22px; }
.pmvp-h-micro .top { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
.pmvp-h-micro .top b { color: var(--ink2); font-weight: 500; }
.pmvp-h-micro .top span { font-family: 'Geist Mono', ui-monospace, monospace; color: var(--muted); }
.pmvp-h-micro .mb { height: 4px; }

/* Weekly bars */
.pmvp-h-tabs { display: inline-flex; gap: 0; border: 1px solid var(--rule); border-radius: 999px; overflow: hidden; }
.pmvp-h-tab {
  font-family: 'Geist Mono', ui-monospace, monospace; font-size: 10px; letter-spacing: .1em;
  text-transform: uppercase; color: var(--muted); padding: 5px 12px; cursor: pointer;
  background: none; border: none; transition: color .15s, background .15s;
}
.pmvp-h-tab.active { color: var(--ink); background: var(--track); }
.pmvp-h-bars { display: flex; align-items: flex-end; gap: 14px; height: 188px; padding: 0 2px; }
.pmvp-h-yguide {
  display: flex; flex-direction: column; justify-content: space-between; height: 150px;
  font-family: 'Geist Mono', ui-monospace, monospace; font-size: 9px; color: var(--muted);
  text-align: right; padding-bottom: 38px;
}
.pmvp-h-barcol { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
.pmvp-h-barcol .kc { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 10px; color: var(--ink2); margin-bottom: 5px; }
.pmvp-h-barcol .bar { width: 100%; max-width: 46px; border-radius: 6px 6px 0 0; }
.pmvp-h-barcol .dy { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 10px; color: var(--muted); margin-top: 8px; }
.pmvp-h-barcol .pr { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 10px; margin-top: 2px; }

.pmvp-h-error {
  font-family: 'Geist Mono', ui-monospace, monospace; font-size: 12px; color: var(--muted);
  padding: 60px 0; text-align: center;
}

/* Responsive */
@media (max-width: 900px) {
  .span4, .span5, .span7, .span12 { grid-column: span 12; }
}
@media (max-width: 480px) {
  .pmvp-h-wrap { padding: 28px 14px 56px; }
  .pmvp-h-micros { grid-template-columns: repeat(2, 1fr); }
  .pmvp-h-bars { gap: 7px; }
}
</style>

<div class="pmvp-h" id="pmvp-health-root">
  <div class="pmvp-h-wrap">

    <div class="pmvp-h-header">
      <div>
        <div class="pmvp-h-brand">MICHAEL PUHALA <span>/</span> HEALTH</div>
        <div class="pmvp-h-sub">Health Dashboard</div>
      </div>
      <div class="pmvp-h-head-right">
        <button class="pmvp-h-toggle" id="pmvp-h-toggle-btn" onclick="pmvpHToggle()">
          <span class="dot"></span> <span id="pmvp-h-mode-name">Daylight</span>
        </button>
        <div class="pmvp-h-updated mono" id="pmvp-h-updated">loading…</div>
      </div>
    </div>

    <div id="pmvp-h-body">
      <div class="pmvp-h-error">loading health data…</div>
    </div>

  </div>
</div>

<script>
(function () {
  var HEALTH_URL = 'https://raw.githubusercontent.com/puhala-code/puhala-website/main/health.json';
  var root = document.getElementById('pmvp-health-root');
  var DATA = null;
  var weekTab = 'this';

  // ── theme ──────────────────────────────────────────────────
  function setModeName() {
    var dark = root.getAttribute('data-mode') === 'dark';
    document.getElementById('pmvp-h-mode-name').textContent = dark ? 'Darkroom' : 'Daylight';
  }
  function pmvpHToggle() {
    var dark = root.getAttribute('data-mode') === 'dark';
    root.setAttribute('data-mode', dark ? '' : 'dark');
    setModeName();
    try { localStorage.setItem('pmvp-h-mode', dark ? '' : 'dark'); } catch(e) {}
  }
  window.pmvpHToggle = pmvpHToggle;
  try { if (localStorage.getItem('pmvp-h-mode') === 'dark') root.setAttribute('data-mode', 'dark'); } catch(e) {}
  setModeName();

  // ── helpers ────────────────────────────────────────────────
  function num(n) { return (typeof n === 'number' && n >= 1000) ? n.toLocaleString() : String(n); }
  function has(v) { return v !== null && v !== undefined; }

  function ring(size, r, sw, frac, colorVar, centerHTML) {
    var C = 2 * Math.PI * r, dash = Math.max(0, Math.min(1, frac)) * C;
    return '<div style="position:relative;width:' + size + 'px;height:' + size + 'px;flex:none;">'
      + '<svg viewBox="0 0 ' + size + ' ' + size + '" style="width:' + size + 'px;height:' + size + 'px;transform:rotate(-90deg);">'
      + '<circle cx="' + size/2 + '" cy="' + size/2 + '" r="' + r + '" fill="none" style="stroke:var(--track)" stroke-width="' + sw + '"></circle>'
      + '<circle cx="' + size/2 + '" cy="' + size/2 + '" r="' + r + '" fill="none" style="stroke:var(' + colorVar + ')" stroke-width="' + sw + '" stroke-linecap="round" stroke-dasharray="' + dash.toFixed(1) + ' ' + (C - dash).toFixed(1) + '"></circle>'
      + '</svg>'
      + '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">' + centerHTML + '</div>'
      + '</div>';
  }

  // returns {line, area} path strings for an array of numbers
  function paths(values, W, H, pad) {
    var v = values.filter(has);
    if (v.length < 2) return { line: '', area: '' };
    var min = Math.min.apply(null, v), max = Math.max.apply(null, v);
    if (min === max) { min -= 1; max += 1; }
    var n = values.length, step = W / (n - 1);
    function y(val) { return H - pad - ((val - min) / (max - min)) * (H - 2 * pad); }
    var pts = [], first = null, last = null;
    for (var i = 0; i < n; i++) {
      if (!has(values[i])) continue;
      var x = i * step, yy = y(values[i]);
      if (first === null) first = x;
      last = x;
      pts.push((pts.length ? 'L' : 'M') + x.toFixed(1) + ',' + yy.toFixed(1));
    }
    var line = pts.join(' ');
    var area = line + ' L' + last.toFixed(1) + ',' + H + ' L' + first.toFixed(1) + ',' + H + ' Z';
    return { line: line, area: area };
  }

  function chart(values, W, H, pad, colorVar, gridLines) {
    var p = paths(values, W, H, pad), g = '';
    (gridLines || []).forEach(function (gy) {
      g += '<line x1="0" y1="' + gy + '" x2="' + W + '" y2="' + gy + '" style="stroke:var(--rule-faint)" stroke-width="1"></line>';
    });
    return '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none" style="width:100%;height:' + H + 'px;display:block;overflow:visible;">'
      + g
      + '<path d="' + p.area + '" style="fill:var(' + colorVar + ');opacity:.13"></path>'
      + '<path d="' + p.line + '" fill="none" style="stroke:var(' + colorVar + ')" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"></path>'
      + '</svg>';
  }

  function spark(values, colorVar) {
    var p = paths(values, 160, 40, 6);
    return '<svg viewBox="0 0 160 40" preserveAspectRatio="none" style="width:100%;height:30px;margin-top:2px;">'
      + '<path d="' + p.line + '" fill="none" style="stroke:var(' + colorVar + ')" stroke-width="2" stroke-linecap="round" vector-effect="non-scaling-stroke"></path>'
      + '</svg>';
  }

  function avg(arr) {
    var v = arr.filter(has);
    return v.length ? Math.round(v.reduce(function (s, x) { return s + x; }, 0) / v.length) : null;
  }

  // ── cards ──────────────────────────────────────────────────
  function cardRecovery(d) {
    var rec = d.recovery || {};
    var colorVar = rec.color === 'green' ? '--green' : rec.color === 'amber' ? '--amber' : '--red';
    var zone = rec.color === 'green' ? 'Green zone · ready to train'
             : rec.color === 'amber' ? 'Yellow · moderate, don’t force it'
             : 'Red · recovery is the work today';
    var center = '<div class="tnum" style="font-size:40px;font-weight:800;letter-spacing:-.03em;line-height:1;color:var(--ink);">'
      + (has(rec.pct) ? rec.pct : '—') + '<span style="font-size:18px;color:var(' + colorVar + ');font-weight:600;">%</span></div>'
      + '<div class="mono" style="font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(' + colorVar + ');margin-top:3px;">Recovered</div>';
    return '<div class="pmvp-h-card span4">'
      + '<div class="pmvp-h-label">Recovery</div>'
      + '<div style="display:flex;align-items:center;gap:20px;margin-top:14px;">'
      + ring(132, 56, 11, (rec.pct || 0) / 100, colorVar, center)
      + '<div style="flex:1;display:flex;flex-direction:column;gap:12px;">'
      + '<div><div class="pmvp-h-statlabel">HRV</div><div class="pmvp-h-statval tnum">' + (has(rec.hrv_ms) ? rec.hrv_ms : '—') + ' <small>ms</small></div></div>'
      + '<div><div class="pmvp-h-statlabel">Resting HR</div><div class="pmvp-h-statval tnum">' + (has(rec.rhr_bpm) ? rec.rhr_bpm : '—') + ' <small>bpm</small></div></div>'
      + '</div></div>'
      + '<div class="pmvp-h-foot">' + zone + '</div>'
      + '</div>';
  }

  function cardSleep(d) {
    var s = d.sleep || {};
    var frac = has(s.performance_pct) ? s.performance_pct / 100 : 0;
    var center = '<div style="font-size:24px;font-weight:800;color:var(--ink);letter-spacing:-.02em;line-height:1;">'
      + (s.duration_label ? s.duration_label.replace('h', '<span style=\"font-size:14px;color:var(--muted)\">h</span>').replace('m', '<span style=\"font-size:14px;color:var(--muted)\">m</span>') : '—')
      + '</div><div class="mono" style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:3px;">Asleep</div>';
    var st = s.stages;
    var stageBar = '', legend = '';
    if (st) {
      var tot = st.deep_min + st.rem_min + st.light_min + (st.awake_min || 0);
      function seg(min, cv) { return '<i style="flex:0 0 ' + (tot ? (min / tot * 100) : 0) + '%;background:var(' + cv + ');"></i>'; }
      stageBar = '<div class="mono" style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Stages</div>'
        + '<div style="display:flex;height:9px;border-radius:999px;overflow:hidden;gap:2px;">'
        + seg(st.deep_min, '--indigo-deep') + seg(st.rem_min, '--sky') + seg(st.light_min, '--slate') + seg(st.awake_min, '--amber')
        + '</div>';
      legend = '<div class="pmvp-h-foot" style="display:flex;gap:16px;flex-wrap:wrap;">'
        + '<span><span style="color:var(--indigo-deep)">●</span> Deep ' + st.deep_label + '</span>'
        + '<span><span style="color:var(--sky)">●</span> REM ' + st.rem_label + '</span>'
        + '<span><span style="color:var(--slate)">●</span> Light ' + st.light_label + '</span>'
        + '</div>';
    }
    return '<div class="pmvp-h-card span4">'
      + '<div class="pmvp-h-cardhead"><div class="pmvp-h-label">Sleep · Last Night</div>'
      + '<div class="mono" style="font-size:10px;color:var(--indigo);">' + (has(s.performance_pct) ? s.performance_pct + '% perf' : '') + '</div></div>'
      + '<div style="display:flex;align-items:center;gap:18px;margin-top:14px;">'
      + ring(100, 43, 9, frac, '--indigo', center)
      + '<div style="flex:1;">'
      + '<div class="mono" style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;">Need ' + (s.need_label || '—') + '</div>'
      + '<div class="pmvp-h-bar" style="margin-bottom:14px;"><i style="width:' + Math.min(100, (frac * 100)) + '%;background:var(--indigo);"></i></div>'
      + stageBar
      + '</div></div>'
      + legend
      + '</div>';
  }

  function cardStrain(d) {
    var st = d.strain || {}, rec = d.recovery || {};
    var score = has(st.score) ? st.score : null;
    var within = (has(rec.pct) && score !== null) ? (score <= rec.pct / 5) : null;
    var note = within === null ? '' : (within
      ? '<span class="c-amber">within recovery ✓</span>'
      : '<span class="c-rose">above recovery ⚠</span>');
    return '<div class="pmvp-h-card span4">'
      + '<div class="pmvp-h-label">Day Strain</div>'
      + '<div style="display:flex;align-items:baseline;gap:10px;margin-top:14px;">'
      + '<div class="tnum" style="font-size:46px;font-weight:800;color:var(--ink);letter-spacing:-.03em;line-height:1;">' + (score !== null ? score.toFixed(1) : '—') + '</div>'
      + '<div class="mono" style="font-size:11px;color:var(--muted2);">/ 21.0 scale</div></div>'
      + '<div style="margin-top:16px;">'
      + '<div class="pmvp-h-bar" style="height:8px;"><i style="width:' + (score !== null ? (score / 21 * 100) : 0) + '%;background:linear-gradient(90deg,var(--sky),var(--cyan));"></i></div>'
      + '<div class="mono" style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:6px;letter-spacing:.06em;"><span>LIGHT</span><span>MODERATE</span><span>STRENUOUS</span><span>ALL OUT</span></div>'
      + '</div>'
      + '<div class="pmvp-h-foot pmvp-h-divider" style="display:flex;justify-content:space-between;align-items:flex-end;">'
      + '<div><div class="pmvp-h-statlabel">Energy Burned</div><div class="pmvp-h-statval tnum">' + (has(st.kcal) ? num(st.kcal) : '—') + ' <small>kcal</small></div></div>'
      + '<div>' + note + '</div>'
      + '</div></div>';
  }

  function cardRecoveryTrend(d) {
    var hist = (d.history || {}).recovery || [];
    var pcts = hist.map(function (r) { return r.pct; });
    var hrv = hist.map(function (r) { return r.hrv; });
    var rhr = hist.map(function (r) { return r.rhr; });
    var strainHist = ((d.history || {}).strain || []).map(function (r) { return r.strain; });
    var a = avg(pcts);
    var cur = function (arr) { var v = arr.filter(has); return v.length ? v[v.length - 1] : '—'; };
    var n = pcts.length;
    return '<div class="pmvp-h-card span7">'
      + '<div class="pmvp-h-cardhead" style="margin-bottom:6px;"><div class="pmvp-h-label">Recovery Trend · ' + (n ? n + ' Day' : '14 Day') + '</div>'
      + '<div class="mono" style="font-size:10px;color:var(--muted2);">avg <span class="c-teal">' + (a !== null ? a + '%' : '—') + '</span></div></div>'
      + chart(pcts, 560, 150, 14, '--teal', [50, 100])
      + '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px;padding-top:16px;" class="pmvp-h-divider">'
      + '<div><div class="pmvp-h-statlabel">HRV</div><div style="display:flex;align-items:baseline;gap:6px;"><span class="tnum" style="font-size:20px;font-weight:700;color:var(--ink2);">' + cur(hrv) + '</span><span style="font-size:11px;color:var(--muted2);">ms</span></div>' + spark(hrv, '--sky') + '</div>'
      + '<div><div class="pmvp-h-statlabel">Resting HR</div><div style="display:flex;align-items:baseline;gap:6px;"><span class="tnum" style="font-size:20px;font-weight:700;color:var(--ink2);">' + cur(rhr) + '</span><span style="font-size:11px;color:var(--muted2);">bpm</span></div>' + spark(rhr, '--amber') + '</div>'
      + '<div><div class="pmvp-h-statlabel">Strain</div><div style="display:flex;align-items:baseline;gap:6px;"><span class="tnum" style="font-size:20px;font-weight:700;color:var(--ink2);">' + cur(strainHist) + '</span><span style="font-size:11px;color:var(--muted2);">avg ' + (avg(strainHist) !== null ? avg(strainHist) : '—') + '</span></div>' + spark(strainHist, '--cyan') + '</div>'
      + '</div></div>';
  }

  function cardWorkouts(d) {
    var ws = d.workouts || [];
    var maxStrain = 21;
    var rows = '';
    var totalMin = 0, peak = 0;
    ws.forEach(function (w) {
      if (has(w.duration_min)) totalMin += w.duration_min;
      if (has(w.strain) && w.strain > peak) peak = w.strain;
      var lift = /weight|strength|power/i.test(w.sport || '');
      rows += '<div class="pmvp-h-wrow">'
        + '<div class="wdate">' + (w.date_label || '') + '</div>'
        + '<div class="wsport"' + (lift ? ' style="font-weight:600;"' : '') + '>' + (w.sport || '—') + '</div>'
        + '<div class="pmvp-h-bar" style="flex:1;height:6px;"><i style="width:' + (has(w.strain) ? (w.strain / maxStrain * 100) : 0) + '%;background:var(' + (lift ? '--sky' : '--cyan') + ');"></i></div>'
        + '<div class="wstrain">' + (has(w.strain) ? w.strain.toFixed(1) : '') + '</div>'
        + '<div class="wdur">' + (w.duration_label || '') + '</div>'
        + '</div>';
    });
    var th = Math.floor(totalMin / 60), tm = totalMin % 60;
    var body = ws.length
      ? '<div style="display:flex;flex-direction:column;gap:11px;flex:1;">' + rows + '</div>'
        + '<div class="pmvp-h-foot pmvp-h-divider" style="display:flex;justify-content:space-between;"><span>' + th + 'h ' + (tm < 10 ? '0' : '') + tm + 'm total</span><span>peak strain <span style="color:var(--ink2);">' + peak.toFixed(1) + '</span></span></div>'
      : '<div style="color:var(--muted);font-size:13px;padding:8px 0;flex:1;">No workouts logged this week.</div>';
    return '<div class="pmvp-h-card span5">'
      + '<div class="pmvp-h-cardhead" style="margin-bottom:14px;"><div class="pmvp-h-label">Workouts · Last 7 Days</div>'
      + '<div class="mono" style="font-size:10px;color:var(--teal-bright);">' + ws.length + ' session' + (ws.length !== 1 ? 's' : '') + '</div></div>'
      + body + '</div>';
  }

  function macroRing(label, actual, target, isLimit) {
    var frac = (target && has(actual)) ? Math.min(1, actual / target) : 0;
    var colorVar = label === 'Protein' ? '--teal' : label === 'Carbs' ? '--sky' : '--rose';
    var statusHTML, sub;
    if (!has(actual)) { statusHTML = '<span class="c-muted">—</span>'; sub = ''; }
    else if (isLimit) {
      sub = 'limit ≤' + target + 'g';
      statusHTML = actual <= target ? '<span class="c-teal" style="font-weight:600;">under ✓</span>'
        : '<span class="c-rose" style="font-weight:600;">' + (actual - target) + 'g over</span>';
    } else {
      sub = 'target ' + target + 'g';
      statusHTML = actual >= target ? '<span class="c-teal" style="font-weight:600;">on target ✓</span>'
        : '<span class="c-rose" style="font-weight:600;">' + (target - actual) + 'g short</span>';
    }
    var center = '<span style="font-size:18px;font-weight:800;color:var(--ink);">' + (has(actual) ? actual : '—') + '</span><span style="font-size:9px;color:var(--muted2);">g</span>';
    return '<div style="display:flex;gap:14px;align-items:center;">'
      + ring(78, 32, 7, frac, colorVar, center)
      + '<div><div class="mono" style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);">' + label + '</div>'
      + '<div style="font-size:12px;color:var(--muted2);margin-top:3px;">' + sub + '</div>'
      + '<div style="font-size:12px;margin-top:2px;">' + statusHTML + '</div></div></div>';
  }

  function microItem(label, actual, target, unit) {
    if (!has(actual)) return '';
    var pct = target ? Math.round(actual / target * 100) : null;
    var cls = pct === null ? '--slate' : pct >= 100 ? '--green' : pct >= 40 ? '--amber' : '--red';
    var w = pct === null ? Math.min(100, actual / 2300 * 100) : Math.min(100, pct);
    var right = pct === null ? num(actual) + ' · —' : num(actual) + ' · ' + pct + '%';
    return '<div class="pmvp-h-micro"><div class="top"><b>' + label + '</b><span>' + right + '</span></div>'
      + '<div class="pmvp-h-bar mb"><i style="width:' + w + '%;background:var(' + cls + ');"></i></div></div>';
  }

  function cardNutritionYesterday(d) {
    var nutr = d.nutrition || {}, y = nutr.yesterday, t = nutr.targets || {};
    if (!y) {
      return '<div class="pmvp-h-card span7"><div class="pmvp-h-label">Nutrition · Yesterday</div>'
        + '<div style="color:var(--muted);font-size:13px;padding:14px 0;">No nutrition data logged.</div></div>';
    }
    var inRange = has(y.kcal) && t.kcal_min && y.kcal >= t.kcal_min && y.kcal <= t.kcal_max;
    var kcalPill = inRange ? '<span class="pmvp-h-pill pill-teal">' + num(y.kcal) + ' kcal · in range ✓</span>'
      : (y.kcal > (t.kcal_max || 1e9)
        ? '<span class="pmvp-h-pill pill-rose">' + num(y.kcal) + ' kcal · over</span>'
        : '<span class="pmvp-h-pill pill-amber">' + num(y.kcal) + ' kcal · under</span>');
    var micros = ''
      + microItem('Fiber', y.fiber_g, t.fiber_g, 'g')
      + microItem('Calcium', y.calcium_mg, t.calcium_mg, 'mg')
      + microItem('Iron', y.iron_mg, t.iron_mg, 'mg')
      + microItem('Vitamin D', y.vitamin_d_iu, t.vitamin_d_iu, 'IU')
      + microItem('Vitamin C', y.vitamin_c_mg, t.vitamin_c_mg, 'mg')
      + microItem('Potassium', y.potassium_mg, t.potassium_mg, 'mg')
      + microItem('Magnesium', y.magnesium_mg, t.magnesium_mg, 'mg')
      + microItem('Zinc', y.zinc_mg, t.zinc_mg, 'mg')
      + microItem('Sodium', y.sodium_mg, t.sodium_mg, 'mg');
    return '<div class="pmvp-h-card span7">'
      + '<div class="pmvp-h-cardhead" style="margin-bottom:16px;"><div class="pmvp-h-label">Nutrition · Yesterday (' + (y.date_label || '') + ')</div>' + kcalPill + '</div>'
      + '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;">'
      + macroRing('Protein', y.protein_g, t.protein_g, false)
      + macroRing('Carbs', y.carbs_g, t.carbs_g, true)
      + macroRing('Fat', y.fat_g, t.fat_g, true)
      + '</div>'
      + '<div style="margin-top:18px;padding-top:16px;" class="pmvp-h-divider">'
      + '<div class="pmvp-h-label" style="margin-bottom:12px;">Micronutrients</div>'
      + '<div class="pmvp-h-micros">' + micros + '</div></div>'
      + '</div>';
  }

  function cardWeight(d) {
    var w = d.weight || {};
    var hist = (w.history || []).map(function (h) { return h.lbs; });
    var delta = null;
    if (hist.length > 1) delta = Math.round((hist[hist.length - 1] - hist[hist.length - 2]) * 10) / 10;
    var deltaPill = '';
    if (delta !== null && delta !== 0) {
      var down = delta < 0;
      deltaPill = '<span class="pmvp-h-pill ' + (down ? 'pill-teal' : 'pill-rose') + '">' + (down ? '▼' : '▲') + ' ' + Math.abs(delta) + ' vs prev</span>';
    }
    function comp(label, val, unit) {
      return '<div><div class="pmvp-h-statlabel">' + label + '</div><div class="pmvp-h-statval tnum" style="font-size:19px;">'
        + (has(val) ? val : '—') + (has(val) && unit ? '<small> ' + unit + '</small>' : '') + '</div></div>';
    }
    return '<div class="pmvp-h-card span5">'
      + '<div class="pmvp-h-cardhead"><div class="pmvp-h-label">Weight & Body Comp · ' + (w.label || '') + '</div>'
      + '<div class="mono" style="font-size:10px;color:var(--muted2);">' + (hist.length ? hist.length + '-pt trend' : '') + '</div></div>'
      + '<div style="display:flex;align-items:baseline;gap:12px;margin-top:14px;flex-wrap:wrap;">'
      + '<div class="pmvp-h-big tnum">' + (has(w.lbs) ? w.lbs : '—') + ' <span class="pmvp-h-unit">lbs</span></div>' + deltaPill + '</div>'
      + '<div class="mono" style="font-size:11px;color:var(--muted2);margin-top:8px;">' + (has(w.avg7) ? '7-day avg ' + w.avg7 : '') + (w.trend_label ? ' · ' + w.trend_label : '') + '</div>'
      + chart(hist, 480, 110, 12, '--amber', [37, 74])
      + '<div style="margin-top:auto;padding-top:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;" class="pmvp-h-divider">'
      + comp('Body Fat', has(w.body_fat_pct) ? w.body_fat_pct + '%' : null, '')
      + comp('Lean Mass', w.lean_lbs, 'lbs')
      + comp('BMI', w.bmi, '')
      + '</div></div>';
  }

  function cardWeekly(d) {
    var nutr = d.nutrition || {}, t = nutr.targets || {};
    var data = weekTab === 'this' ? (nutr.week || []) : (nutr.last_week || []);
    var todayStr = (d.updated || '').slice(0, 10);
    var kcals = data.filter(function (r) { return r.logged; }).map(function (r) { return r.kcal; });
    var scale = Math.max.apply(null, [2200].concat(kcals));
    var maxPx = 140;
    var targetMid = (t.kcal_min && t.kcal_max) ? (t.kcal_min + t.kcal_max) / 2 : null;

    var bars = '';
    data.forEach(function (r) {
      if (r.logged) {
        var h = Math.round(r.kcal / scale * maxPx);
        var hit = r.protein_hit;
        var fill = hit ? 'linear-gradient(180deg,var(--teal),var(--teal-bright))' : 'var(--slate)';
        bars += '<div class="pmvp-h-barcol">'
          + '<div class="kc">' + num(r.kcal) + '</div>'
          + '<div class="bar" style="height:' + h + 'px;background:' + fill + ';"></div>'
          + '<div class="dy">' + r.day + '</div>'
          + '<div class="pr" style="color:var(' + (hit ? '--teal-bright' : '--muted') + ');">' + r.protein_g + 'g ' + (hit ? '✓' : '✕') + '</div>'
          + '</div>';
      } else {
        var isToday = r.date === todayStr;
        bars += '<div class="pmvp-h-barcol">'
          + '<div class="bar" style="height:5px;background:var(--track);"></div>'
          + '<div class="dy">' + r.day + '</div>'
          + '<div class="pr" style="color:var(' + (isToday ? '--amber' : '--muted') + ');">' + (isToday ? 'today' : '—') + '</div>'
          + '</div>';
      }
    });

    var logged = data.filter(function (r) { return r.logged; });
    var aKcal = logged.length ? Math.round(logged.reduce(function (s, r) { return s + r.kcal; }, 0) / logged.length) : 0;
    var aProt = logged.length ? Math.round(logged.reduce(function (s, r) { return s + r.protein_g; }, 0) / logged.length) : 0;
    var protHit = logged.filter(function (r) { return r.protein_hit; }).length;
    var thisLabel = 'This Week', lastLabel = nutr.last_week_label || 'Last Week';

    var refLine = targetMid ? '<div style="position:absolute;left:0;right:0;bottom:' + (38 + Math.round(targetMid / scale * maxPx)) + 'px;border-top:1px dashed var(--teal-border);"></div>' : '';

    return '<div class="pmvp-h-card span12">'
      + '<div class="pmvp-h-cardhead" style="margin-bottom:18px;">'
      + '<div class="pmvp-h-label">Nutrition · Weekly</div>'
      + '<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">'
      + '<div class="mono" style="font-size:11px;color:var(--muted2);">' + logged.length + '-day avg <span style="color:var(--ink2);">' + num(aKcal) + ' kcal</span> · <span style="color:var(--ink2);">' + aProt + 'g protein</span> · protein <span class="c-amber">' + protHit + ' of ' + logged.length + '</span></div>'
      + '<div class="pmvp-h-tabs"><button class="pmvp-h-tab' + (weekTab === 'this' ? ' active' : '') + '" onclick="pmvpWeekTab(\'this\')">' + thisLabel + '</button>'
      + '<button class="pmvp-h-tab' + (weekTab === 'last' ? ' active' : '') + '" onclick="pmvpWeekTab(\'last\')">' + lastLabel + '</button></div>'
      + '</div></div>'
      + '<div class="pmvp-h-bars">'
      + '<div class="pmvp-h-yguide"><span>' + num(Math.round(scale)) + '</span><span>' + num(Math.round(scale / 2)) + '</span><span>0</span></div>'
      + '<div style="flex:1;display:flex;gap:16px;align-items:flex-end;height:100%;position:relative;">' + refLine + bars + '</div>'
      + '</div></div>';
  }

  // ── render ─────────────────────────────────────────────────
  function render() {
    var d = DATA;
    document.getElementById('pmvp-h-updated').textContent = d.updated_label || '';
    var html = '<div class="pmvp-h-grid">'
      + cardRecovery(d) + cardSleep(d) + cardStrain(d)
      + cardRecoveryTrend(d) + cardWorkouts(d)
      + cardNutritionYesterday(d) + cardWeight(d)
      + cardWeekly(d)
      + '</div>';
    document.getElementById('pmvp-h-body').innerHTML = html;
  }

  function pmvpWeekTab(which) { weekTab = which; render(); }
  window.pmvpWeekTab = pmvpWeekTab;

  // ── fetch ──────────────────────────────────────────────────
  fetch(HEALTH_URL + '?t=' + Date.now())
    .then(function (r) { return r.json(); })
    .then(function (d) { DATA = d; render(); })
    .catch(function () {
      document.getElementById('pmvp-h-body').innerHTML =
        '<div class="pmvp-h-error">health data unavailable — check back shortly</div>';
    });
})();
</script>
